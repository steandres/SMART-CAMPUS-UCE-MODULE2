name: CI

on:
  push:
    branches: [main, qa]
  pull_request:
    branches: [main, qa]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build scholarship-service
        run: npm run build

      - name: Build socioeconomic-form-service
        run: npm run build:socioeconomic

      - name: Build psychological-care-service
        run: npm run build:psychological

      - name: Run tests
        run: npm run test -- --passWithNoTests

      - name: Build welfare-frontend
        working-directory: apps/welfare-frontend
        run: |
          npm ci
          npm run build
